syntax = "proto3";

package alphaos;

// The service definition
service AlphaZero {
  // Bidirectional stream: Server sends SignalRequest, Client sends SignalResponse
  rpc StreamSignals (stream SignalResponse) returns (stream SignalRequest) {}
  
  // Unary call for simple ping/health check
  rpc HealthCheck (Ping) returns (Pong) {}
}

message Ping {
  string client_id = 1;
  int64 timestamp = 2;
}

message Pong {
  string server_id = 1;
  int64 timestamp = 2;
  bool ready = 3;
}

message SignalRequest {
  string request_id = 1;
  string symbol = 2;
  string timeframe = 3;
  
  // Market Data
  repeated Candle market_context = 4; // History candles for feature engineering
  Quote tick_data = 5; // Real-time tick
  
  // DOM Data
  repeated DOMLevel dom_bids = 11;
  repeated DOMLevel dom_asks = 12;
  
  // Signal Info (if originating from an indicator)
  string signal_source = 6; // e.g., "PivotTrendSignals"
  string action = 7; // "BUY", "SELL"
  double suggested_entry = 8;
  double suggested_sl = 9;
  double suggested_tp = 10;

  // Technical Context (New: EA calculated features)
  TechnicalContext technical_context = 13;
}

message TechnicalContext {
    // Core Trend
    double ema_short = 1;
    double ema_long = 2;
    double atr = 3;
    double adx = 4;
    double rsi = 5;
    double center = 6;

    // Boolean Flags
    bool distance_ok = 7;
    bool slope_ok = 8;
    bool trend_filter_ok = 9;
    bool htf_trend_ok = 10;
    bool volatility_ok = 11;
    bool chop_ok = 12;
    bool spread_ok = 13;

    // State & Structure
    int32 bars_since_last = 14;
    int32 trend_direction = 15;
    int32 ema_cross_event = 16;
    double ema_spread = 17;
    double atr_percent = 18;
    int32 reclaim_state = 19;
    bool is_reclaim_signal = 20;
    double price_vs_center = 21;
    double cloud_width = 22;

    // Microstructure
    int64 tick_volume = 23;
    double spread = 24;
    double candle_size = 25;
    double wick_upper = 26;
    double wick_lower = 27;
}

message DOMLevel {
  double price = 1;
  double volume = 2;
  double volume_real = 3; // If available
}

message SignalResponse {
  string request_id = 1; // Must match request_id
  string client_id = 2;
  
  // Decision
  bool should_execute = 3;
  string action = 4; // "BUY", "SELL", "PASS"
  double confidence = 5; // 0.0 - 1.0 (Used as MFE Prediction in Regression Mode)
  
  // Modified Trade Params (AI optimization)
  double adjusted_sl = 6;
  double adjusted_tp = 7;
  double adjusted_volume = 8;
  
  string reason = 9; // Explainability
}

message Candle {
  int64 time = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  double volume = 6;
}

message Quote {
  int64 time = 1;
  double bid = 2;
  double ask = 3;
}
