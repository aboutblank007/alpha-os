version: '3.8'

services:
  mt5:
    image: gmag11/metatrader5_vnc:latest
    platform: linux/amd64
    container_name: mt5-vnc
    ports:
      - "3000:3000" # Web VNC
      - "8001:8001" # VNC WebSocket (if needed)
    environment:
      - PASSWORD=trading
    volumes:
      - mt5_config:/config
      # Map EA to MT5 Experts folder
      - ../mql5:/config/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts/AlphaOS
      # Map Indicators to MT5 Indicators folder
      - ../mql5:/config/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Indicators/AlphaOS
      # Shared volume for signals between MT5 and Bridge
      - signal_data:/config/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Files/AlphaOS/Signals
    networks:
      - trading-net
    restart: unless-stopped

  bridge-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: bridge-api
    ports:
      - "8000:8000" # HTTP API
      - "50051:50051" # gRPC API
    environment:
      # API binds to 0.0.0.0 inside its container
      - ZMQ_BIND_ADDRESS=tcp://0.0.0.0:5555
      - ZMQ_SUB_ADDRESS=tcp://0.0.0.0:5556
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SIGNAL_DIR=/app/signals
    volumes:
      # Mount the same shared volume for signals
      - signal_data:/app/signals
      # Mount the proto directory so it's available for generation at runtime
      - ../../src/proto:/app/src/proto
    networks:
      - trading-net
    restart: unless-stopped

networks:
  trading-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  mt5_config:
  signal_data:
